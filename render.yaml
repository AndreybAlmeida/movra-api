services:
  - type: web
    name: movra-api
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: movra-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: movra-db
    plan: basic-256mb
    databaseName: movra
    user: movra
