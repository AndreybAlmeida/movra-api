services:
  - type: web
    name: movra-api
    runtime: node
    plan: free
    buildCommand: npm install && node scripts/migrate.js
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PAYMENT_PROVIDER
        value: mock
      - key: WHATSAPP_PROVIDER
        value: log
